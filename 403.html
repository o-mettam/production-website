<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied | Owen Mettam</title>
    <link rel="icon" type="image/jpeg" href="C81028FC-F723-4007-A819-5DE3B6E56C7F_1_105_c.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            color: #4f46e5;
            font-weight: 700;
        }
        .dark .gradient-text {
            color: #818cf8;
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
    </style>
    <script>
        if (localStorage.getItem('darkMode') === 'true' ||
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-800 dark:text-gray-200 transition-colors min-h-screen flex items-center justify-center px-6">
    <div class="text-center max-w-lg">
        <div class="float-animation mb-8">
            <span class="text-8xl md:text-9xl font-bold gradient-text">403</span>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold mb-4">Access Denied</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8 leading-relaxed">
            You don't have permission to access this page. If you believe this is an error, feel free to reach out.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-lg transition-all hover:-translate-y-0.5 hover:shadow-lg">
                <i class="fas fa-home mr-2" aria-hidden="true"></i>
                Back to Home
            </a>
            <a href="/#contact" class="inline-flex items-center justify-center border-2 border-indigo-600 dark:border-indigo-400 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-600 hover:text-white font-semibold px-8 py-3 rounded-lg transition-all hover:-translate-y-0.5">
                <i class="fas fa-envelope mr-2" aria-hidden="true"></i>
                Contact Me
            </a>
        </div>
        <div class="mt-12 text-sm text-gray-500 dark:text-gray-500">
            <p>&copy; 2026 Owen Mettam</p>
        </div>
    </div>
</body>
</html>
